name: build-windows

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  release:
    types: [published, edited]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          $nuget = Join-Path $env:RUNNER_TEMP "nuget.exe"
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nuget

          & $nuget install Microsoft.Web.WebView2 -OutputDirectory packages -ExcludeVersion

          $includePath = Join-Path $PWD "packages/Microsoft.Web.WebView2/build/native/include"
          $libPath = Join-Path $PWD "packages/Microsoft.Web.WebView2/build/native/x64"

          if (-not (Test-Path (Join-Path $includePath "WebView2.h"))) {
            throw "WebView2.h not found after SDK install."
          }

          if (-not (Test-Path (Join-Path $libPath "WebView2LoaderStatic.lib"))) {
            throw "WebView2LoaderStatic.lib not found after SDK install."
          }

          "INCLUDE=$includePath;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIB=$libPath;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: cmake -S . -B _build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build _build --config Release

      - name: Prepare Release Binary Name
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $candidates = @(
            "_build/Release/ss-ext.exe",
            "_build/Release/Carex-Ext.exe",
            "_build/src/Release/ss-ext.exe",
            "_build/src/Release/Carex-Ext.exe"
          )

          $source = $null
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              $source = $candidate
              break
            }
          }

          if (-not $source) {
            Write-Host "No release exe in known locations. Available exe files under _build:"
            Get-ChildItem -Path _build -Recurse -Filter *.exe | ForEach-Object { $_.FullName }
            throw "Release .exe not found. Check CMake target output path/name."
          }

          Copy-Item $source dist/Carex-Ext.exe -Force

          $hash = (Get-FileHash -Path dist/Carex-Ext.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path dist/Carex-Ext.exe.sha256 -Value "$hash  Carex-Ext.exe" -Encoding ascii -NoNewline

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carex-ext-windows-x64
          path: |
            dist/Carex-Ext.exe
            dist/Carex-Ext.exe.sha256
            installer/ss-ext.iss

      - name: Publish GitHub Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/Carex-Ext.exe
            dist/Carex-Ext.exe.sha256
          overwrite_files: true
          generate_release_notes: true

      - name: Publish GitHub Release Asset (Tag Push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/Carex-Ext.exe
            dist/Carex-Ext.exe.sha256
          overwrite_files: true
          generate_release_notes: true
